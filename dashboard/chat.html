<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wemik — Secure AI</title>
  <link rel="icon" type="image/png" href="/wemik-logo.png" />
  <link rel="stylesheet" href="/mock-chat.css" />
</head>
<body>
  <div class="app-shell" data-sidebar="closed" data-artifact="closed">
    <div class="scrim" data-close-sidebar></div>

    <aside class="sidebar" aria-label="Conversation sidebar">
      <div class="brand">
        <span class="brand-mark"><img src="/wemik-logo.png" alt="" /></span>
        <span>
          <strong>Wemik</strong>
          <small>SECURE AI</small>
        </span>
      </div>

      <button class="new-chat-button" id="newChatButton" type="button">
        <span class="ui-icon icon-plus" aria-hidden="true"></span>
        New Chat
      </button>

      <nav class="conversation-nav" id="conversationNav" aria-label="Past chats"></nav>

      <div class="sidebar-footer">
        <button class="icon-text-button" id="settingsButton" type="button">
          <span class="ui-icon icon-settings" aria-hidden="true"></span>
          Settings
        </button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <button class="mobile-menu-button" id="menuButton" type="button" aria-label="Open conversations">
          <span class="ui-icon icon-menu" aria-hidden="true"></span>
        </button>
        <div class="header-title">
          <span id="conversationTitle">New chat</span>
          <small>Sensitive data is redacted on this device — only placeholders are sent</small>
        </div>
        <button class="header-pill" id="headerPrivacy" type="button" aria-label="Privacy status">
          <span class="dot"></span> On-device guard
        </button>
      </header>

      <section class="chat-content" id="chatContent" aria-live="polite"></section>

      <section class="composer-region" aria-label="Message composer">
        <div class="quick-prompts" id="quickPrompts" aria-label="Quick prompts"></div>
        <div class="attachment-preview" id="attachmentPreview" hidden></div>
        <form class="composer" id="composer">
          <div class="composer-toolbar" aria-label="Privacy controls">
            <span>Local Guard Active</span>
            <span>Placeholders before provider</span>
          </div>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.pdf" hidden />
          <button class="attach-button" id="attachButton" type="button" aria-label="Attach a file" title="Attach Excel, CSV or PDF">
            <span class="ui-icon icon-plus" aria-hidden="true"></span>
          </button>
          <label class="sr-only" for="messageInput">Message Wemik</label>
          <textarea id="messageInput" rows="1" placeholder="Attach a customer file, or paste sensitive context. Wemik guards it locally before provider handoff..." autocomplete="off"></textarea>
          <button class="send-button" id="sendButton" type="submit" aria-label="Send message">
            <span class="ui-icon icon-send send-icon" aria-hidden="true"></span>
            <span class="loading-spinner" aria-hidden="true"></span>
          </button>
        </form>
      </section>
    </main>

    <aside class="artifact-panel" id="artifactPanel" aria-label="Document preview">
      <header class="artifact-head">
        <div class="artifact-title">
          <span class="artifact-icon" aria-hidden="true"></span>
          <div class="artifact-title-text">
            <strong id="artifactName">Reorganised file</strong>
            <small id="artifactMeta">restored locally on your device</small>
          </div>
        </div>
        <div class="artifact-actions">
          <button class="artifact-download" id="artifactDownload" type="button">
            <span aria-hidden="true">↓</span> Download
          </button>
          <button class="icon-button" id="artifactClose" type="button" aria-label="Close preview">
            <span class="ui-icon icon-close" aria-hidden="true"></span>
          </button>
        </div>
      </header>
      <div class="artifact-tabs" id="artifactTabs">
        <button class="artifact-tab active" type="button" data-artifact-tab="table">Reorganised sheet</button>
        <button class="artifact-tab" type="button" data-artifact-tab="sent">What the model saw</button>
      </div>
      <div class="artifact-body" id="artifactBody"></div>
      <footer class="artifact-foot" id="artifactFoot"></footer>
    </aside>
  </div>

  <div class="modal" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal-panel">
      <div class="modal-head">
        <div>
          <h2 id="settingsTitle">Settings</h2>
          <p>Prototype preferences stored in this browser only.</p>
        </div>
        <button class="icon-button" id="closeSettingsButton" type="button" aria-label="Close settings">
          <span class="ui-icon icon-close" aria-hidden="true"></span>
        </button>
      </div>

      <div class="settings-grid">
        <label class="field">
          <span>Assistant mode</span>
          <select id="modeSelect">
            <option>Banking Assistant</option>
            <option>Document Analyst</option>
            <option>General</option>
          </select>
        </label>
        <label class="toggle-row">
          <span>
            <strong>Persist preview chats</strong>
            <small>Uses localStorage for the frontend preview. No backend or database.</small>
          </span>
          <input id="persistToggle" type="checkbox" checked />
        </label>
        <label class="toggle-row">
          <span>
            <strong>Reduce assistant motion</strong>
            <small>Overrides animation for this prototype.</small>
          </span>
          <input id="motionToggle" type="checkbox" />
        </label>
      </div>
    </div>
  </div>

  <script src="/mock-chat.js"></script>
</body>
</html>
